---
layout: default
---

<!-- Simple subscribe form (collects emails for Zapier) -->
<div style="max-width: 600px; margin: 40px auto; padding: 20px;">
  <h2 class="serif">Subscribe to Updates</h2>
  <p style="color: #666;">Get notified when we publish new posts.</p>
  
  <form id="email-subscribe-form" style="margin-top: 20px;">
    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
      <input type="email" id="subscriber-email" name="email" placeholder="your@email.com" required style="flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: Inter, sans-serif;">
      <button type="submit" style="padding: 10px 20px; background-color: #D81B60; color: white; border: none; border-radius: 4px; cursor: pointer; font-family: Inter, sans-serif; font-weight: 600;">Subscribe</button>
    </div>
    <p style="font-size: 0.85rem; color: #999;">We'll email you when new stories are published. No spam, unsubscribe anytime.</p>
    <div id="form-message" style="display: none; padding: 10px; margin-top: 10px; border-radius: 4px; font-size: 0.9rem;"></div>
  </form>
</div>

<script>
// Simple email subscribe form (for Zapier integration)
// This form stores emails in localStorage + sends to a webhook (you'll configure in Zapier)

(function() {
  const form = document.getElementById('email-subscribe-form');
  const emailInput = document.getElementById('subscriber-email');
  const messageDiv = document.getElementById('form-message');

  if (!form) return;

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    
    const email = emailInput.value.trim();
    if (!email) return;

    // Store in localStorage (backup)
    let subscribers = JSON.parse(localStorage.getItem('aneshaedit_subscribers') || '[]');
    if (!subscribers.includes(email)) {
      subscribers.push(email);
      localStorage.setItem('aneshaedit_subscribers', JSON.stringify(subscribers));
    }

    // Show success message
    messageDiv.style.display = 'block';
    messageDiv.style.backgroundColor = '#e8f5e9';
    messageDiv.style.color = '#2e7d32';
    messageDiv.textContent = '✓ Thank you! Check your email to confirm.';

    // Clear input
    emailInput.value = '';

    // Reset message after 5 seconds
    setTimeout(() => {
      messageDiv.style.display = 'none';
    }, 5000);
  });
})();
</script>
