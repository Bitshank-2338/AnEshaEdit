# Decap CMS (FREE) configuration
# Authentication: Netlify Identity + Git Gateway
# Publishing: commits Markdown posts to GitHub (repo: Bitshank-2338/AnEshaEdit)

backend:
  name: git-gateway
  branch: main

# Public site URL (readers)
display_url: https://bitshank-2338.github.io/AnEshaEdit/
site_url: https://bitshank-2338.github.io/AnEshaEdit/
logo_url: https://bitshank-2338.github.io/AnEshaEdit/logo.png

# Keep it simple for the client (no PR workflow)
publish_mode: simple

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "posts"
    label: "Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { name: "layout", label: "Layout", widget: "hidden", default: "post" }
      - { name: "title", label: "Title", widget: "string" }
      - { name: "category", label: "Category", widget: "select", options: ["The Curated Edit", "Modern Lineage", "The Modern Boho", "Heritage Textures", "Shopping Guide"] }
      - { name: "excerpt", label: "Excerpt", widget: "text" }
      - { name: "hero", label: "Hero Image", widget: "image", required: false }
      - { name: "date", label: "Publish Date", widget: "datetime" }
      - { name: "body", label: "Body", widget: "markdown" }
